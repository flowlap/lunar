<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a1a">
  <link rel="manifest" href="manifest.json">
  <title>Lunar</title>
  <script src="https://cdn.jsdelivr.net/npm/suncalc@1.9.0/suncalc.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1 class="app-title">🌙 Lunar</h1>
      <span id="update-time" class="update-time"></span>
    </header>
    <div id="loading-screen" class="screen">
      <div class="spinner"></div>
      <p>위치 정보를 가져오는 중...</p>
    </div>
    <div id="error-screen" class="screen hidden">
      <p id="error-message" class="error-text"></p>
      <form id="manual-location-form" class="manual-form">
        <label>위도 <input type="number" id="input-lat" step="0.0001" placeholder="37.5665"></label>
        <label>경도 <input type="number" id="input-lon" step="0.0001" placeholder="126.9780"></label>
        <button type="submit">확인</button>
      </form>
    </div>
    <main id="main-screen" class="screen hidden">
      <section class="compass-section">
        <div id="compass-container"></div>
      </section>
      <button id="compass-permission-btn" class="permission-btn hidden">
        <span class="permission-btn-icon">🧭</span>
        <span class="permission-btn-body">
          <span class="permission-btn-title">나침반 활성화하기</span>
          <span class="permission-btn-sub">달이 어느 방향에 있는지 실시간으로 표시합니다</span>
        </span>
        <span class="permission-btn-arrow">›</span>
      </button>
      <section class="info-card">
        <div class="info-row">
          <span class="info-label">방향</span>
          <span id="info-direction" class="info-value">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">방위각</span>
          <span id="info-azimuth" class="info-value">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">고도</span>
          <span id="info-altitude" class="info-value">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">위상</span>
          <span id="info-phase" class="info-value">—</span>
        </div>
      </section>
      <section class="altitude-section">
        <div id="altitude-container"></div>
      </section>
      <div id="below-horizon-msg" class="horizon-msg hidden">
        🌑 현재 달이 지평선 아래에 있습니다
      </div>

      <!-- 월출 / 월몰 -->
      <section class="info-card">
        <div class="card-title">월출 / 월몰 <span id="times-tz-label" class="tz-label"></span></div>
        <div class="info-row">
          <span class="info-label" id="moonrise-label">🌅 다음 월출</span>
          <span id="info-moonrise" class="info-value">—</span>
        </div>
        <div class="info-row">
          <span class="info-label" id="moonset-label">🌇 다음 월몰</span>
          <span id="info-moonset" class="info-value">—</span>
        </div>
      </section>

      <!-- 달까지의 거리 -->
      <section class="info-card">
        <div class="card-title">달까지의 거리</div>
        <div class="info-row">
          <span class="info-label">현재 거리</span>
          <span id="info-distance" class="info-value">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">평균 대비</span>
          <span id="info-distance-diff" class="info-value">—</span>
        </div>
        <div id="supermoon-badge" class="supermoon-badge hidden">🌕 슈퍼문 — 평소보다 가까운 달!</div>
        <div id="minimoon-badge" class="minimoon-badge hidden">🌑 미니문 — 평소보다 먼 달</div>
      </section>

      <!-- 오늘의 달 궤적 -->
      <section class="info-card">
        <div class="card-title">오늘의 달 궤적</div>
        <div id="trajectory-container" class="trajectory-wrap"></div>
      </section>

      <!-- 다음 보름달 D-day -->
      <section class="info-card">
        <div class="info-row">
          <span class="info-label">🌕 다음 보름달</span>
          <span id="info-fullmoon" class="info-value">—</span>
        </div>
      </section>

      <!-- 이번 달 위상 달력 -->
      <section class="info-card">
        <div class="card-title">이번 달 위상</div>
        <div id="phase-calendar"></div>
      </section>

      <!-- 달 사진 추천일 -->
      <section class="info-card">
        <div class="card-title">📸 달 사진 추천일 (향후 30일)</div>
        <div class="photo-type-selector">
          <button class="photo-type-btn active" data-type="full">🌕 보름달</button>
          <button class="photo-type-btn" data-type="surface">🔭 표면 디테일</button>
          <button class="photo-type-btn" data-type="landscape">🏔 달 풍경</button>
        </div>
        <div id="photo-days"></div>
      </section>

      <footer class="location-footer">
        <span id="info-coords" class="coords-text"></span>
      </footer>
    </main>
  </div>
  <script type="module" src="src/app.js"></script>
</body>
</html>
